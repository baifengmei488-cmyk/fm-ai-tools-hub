databases:
  - name: toolvault-db
    plan: free
    databaseName: toolvault
    user: toolvault

services:
  - type: web
    name: toolvault-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TOOLVAULT_DATABASE_URL
        fromDatabase:
          name: toolvault-db
          property: connectionString
      - key: TOOLVAULT_SECRET_KEY
        generateValue: true
      - key: TOOLVAULT_ADMIN_USERNAME
        value: admin
      - key: TOOLVAULT_ADMIN_PASSWORD
        sync: false
      - key: TOOLVAULT_CORS_ORIGINS
        sync: false

  - type: web
    name: toolvault-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        sync: false
